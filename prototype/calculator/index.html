        function closeAllDrawers() {
            document.getElementById('sidebar').classList.remove('is-open');
            document.getElementById('filterSidebar').classList.remove('is-open');
            document.getElementById('historyDrawer').classList.remove('is-open');
            document.getElementById('drawerOverlay').classList.remove('is-visible');
        }

        function setSalary(amount) {
            document.getElementById('salaryInput').value = amount;
            validateSalary(amount);
            updateCalculation();
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ========================================
        // 计算逻辑
        // ========================================
        function updateCalculation() {
            const salaryInput = document.getElementById('salaryInput');
            const salary = parseFloat(salaryInput.value) || 0;

            if (salary <= 0) {
                // 清空显示
                document.getElementById('totalAmount').textContent = '¥ 0.00';
                document.getElementById('companyTotal').textContent = '¥ 0.00';
                document.getElementById('personalTotal').textContent = '¥ 0.00';
                
                document.getElementById('combinedTableBody').innerHTML = '';
                return;
            }

            const base = calculateBase(salary);
            const socialScheme = document.getElementById('socialScheme').value;
            const fundSchemeValue = document.getElementById('fundScheme').value;

            // 不允许同时为空
            if (!socialScheme && !fundSchemeValue) {
                document.getElementById('totalAmount').textContent = '¥ 0.00';
                document.getElementById('companyTotal').textContent = '¥ 0.00';
                document.getElementById('personalTotal').textContent = '¥ 0.00';
                document.getElementById('combinedTableBody').innerHTML = '<tr><td colspan="8" style="text-align: center; color: var(--qy-text-muted);">请至少选择社保方案或公积金方案</td></tr>';
                return;
            }

            const fundRate = fundSchemeValue ? parseFloat(fundSchemeValue) / 100 : 0;

            let companySocialTotal = 0;
            let personalSocialTotal = 0;
            let companySocialFixedTotal = 0;
            let personalSocialFixedTotal = 0;
            let companySocialRateTotal = 0;
            let personalSocialRateTotal = 0;
            let companyFundTotal = 0;
            let personalFundTotal = 0;

            // 生成社保表格
            const tableBody = document.getElementById('combinedTableBody');
            tableBody.innerHTML = '';

            let rowIndex = 0;

            // 只有选择了社保方案才渲染社保明细
            if (socialScheme) {
            for (const [key, config] of Object.entries(insuranceConfig)) {
                if (config.type === 'social') {
                    let companyAmount, personalAmount;
                    let billingStandardCell, fixedAmountCell, companyCell, personalCell;
                    let amountCell;

                    let companyFixedCell, personalFixedCell, companyRateCell, personalRateCell;

                    if (config.billingType === 'rate') {
                        companyAmount = base * config.companyRate;
                        personalAmount = base * config.personalRate;
                        billingStandardCell = `
                            <div class="base-amount">${base.toLocaleString()}<span class="amount-unit">元</span></div>
                            <div class="base-range">(${baseRange.min.toLocaleString()} ~ ${baseRange.max.toLocaleString()})</div>`;
                        companyBaseCell = billingStandardCell;
                        personalBaseCell = billingStandardCell;
                        companyFixedCell = '<span class="text-muted">-</span>';
                        personalFixedCell = '<span class="text-muted">-</span>';
                        companyRateCell = `<div>${(config.companyRate * 100).toFixed(1)}%</div><div class="rate">${companyAmount.toFixed(2)}</div>`;
                        personalRateCell = `<div>${(config.personalRate * 100).toFixed(1)}%</div><div class="rate">${personalAmount.toFixed(2)}</div>`;
                        // 累加比例
                        companySocialRateTotal += config.companyRate;
                        personalSocialRateTotal += config.personalRate;
                        // 比例缴费项目，存缴金额显示月缴金额
                        amountCell = `<span class="amount">${(companyAmount + personalAmount).toFixed(2)}</span>`;
                    } else if (config.billingType === 'fixed_yearly') {
                        const companyYearly = config.companyFixed || 0;
                        const personalYearly = config.personalFixed || 0;
                        // 月缴金额用于合计统计
                        companyAmount = companyYearly / 12;
                        personalAmount = personalYearly / 12;
                        billingStandardCell = `<span class="billing-badge">按年固定</span>`;
                        companyBaseCell = billingStandardCell;
                        personalBaseCell = billingStandardCell;
                        // 固定费用只在固定列显示，比例列显示 -
                        companyFixedCell = companyYearly > 0 ? `<span class="amount-fixed">¥${companyYearly}/年</span>` : '<span class="text-muted">-</span>';
                        personalFixedCell = personalYearly > 0 ? `<span class="amount-fixed">¥${personalYearly}/年</span>` : '<span class="text-muted">-</span>';
                        companyRateCell = '<span class="text-muted">-</span>';
                        personalRateCell = '<span class="text-muted">-</span>';
                        // 累加固定金额
                        companySocialFixedTotal += companyYearly;
                        personalSocialFixedTotal += personalYearly;

                        // 按年缴费的项目，存缴金额显示年缴金额
                        const yearlyTotal = companyYearly + personalYearly;
                        amountCell = `<span class="amount-fixed">¥${yearlyTotal}/年</span>`;
                    }

                    companySocialTotal += companyAmount;
                    personalSocialTotal += personalAmount;

                    const row = document.createElement('tr');
                    row.style.animationDelay = `${rowIndex * 0.05}s`;
                    row.innerHTML = `
                        <td data-label="项目"><span class="ins-type-badge badge-social">${config.name}</span></td>
                        <td data-label="单位缴费基数" style="text-align: center">${companyBaseCell}</td>
                        <td data-label="个人缴费基数" style="text-align: center">${personalBaseCell}</td>
                        <td data-label="单位固定" style="text-align: center">${companyFixedCell}</td>
                        <td data-label="个人固定" style="text-align: center">${personalFixedCell}</td>
                        <td data-label="单位比例" style="text-align: center">${companyRateCell}</td>
                        <td data-label="个人比例" style="text-align: center">${personalRateCell}</td>
                        <td data-label="存缴金额" style="text-align: right">${amountCell}</td>
                    `;
                    tableBody.appendChild(row);
                    rowIndex++;
                }
            }
            }

            // 只有选择了社保方案才显示社保合计
            if (socialScheme) {
            // 社保合计行
            const socialTotalRow = document.createElement('tr');
            socialTotalRow.className = 'total-row';
            const companySocialFixedDisplay = companySocialFixedTotal > 0 ? `<span class="amount-fixed">¥${companySocialFixedTotal}/年</span>` : '<span class="text-muted">-</span>';
            const personalSocialFixedDisplay = personalSocialFixedTotal > 0 ? `<span class="amount-fixed">¥${personalSocialFixedTotal}/年</span>` : '<span class="text-muted">-</span>';
            socialTotalRow.innerHTML = `
                <td data-label="项目" style="text-align: right; font-weight: 600;">社保合计</td>
                <td data-label="单位缴费基数"><span class="text-muted">-</span></td>
                <td data-label="个人缴费基数"><span class="text-muted">-</span></td>
                <td data-label="单位固定" style="text-align: center">${companySocialFixedDisplay}</td>
                <td data-label="个人固定" style="text-align: center">${personalSocialFixedDisplay}</td>
                <td data-label="单位比例" style="text-align: center"><div>${(companySocialRateTotal * 100).toFixed(1)}%</div><div class="rate">${companySocialTotal.toFixed(2)}</div></td>
                <td data-label="个人比例" style="text-align: center"><div>${(personalSocialRateTotal * 100).toFixed(1)}%</div><div class="rate">${personalSocialTotal.toFixed(2)}</div></td>
                <td data-label="存缴金额" style="text-align: right"><span class="amount">${(companySocialTotal + personalSocialTotal).toFixed(2)}</span></td>
            `;
            tableBody.appendChild(socialTotalRow);
            }

            // 只有选择了公积金方案才渲染公积金明细
            if (fundSchemeValue) {
            // 生成公积金表格


            const fundConfig = insuranceConfig.fund;
            companyFundTotal = base * fundRate;
            personalFundTotal = base * fundRate;

            const fundRow = document.createElement('tr');
            fundRow.className = 'fund-row';
            const fundBaseCell = `
                <div class="base-amount">${base.toLocaleString()}<span class="amount-unit">元</span></div>
                <div class="base-range">(${baseRange.min.toLocaleString()} ~ ${baseRange.max.toLocaleString()})</div>`;
            fundRow.innerHTML = `
                <td data-label="项目"><span class="ins-type-badge badge-fund">${fundConfig.name}</span></td>
                <td data-label="单位缴费基数" style="text-align: center">${fundBaseCell}</td>
                <td data-label="个人缴费基数" style="text-align: center">${fundBaseCell}</td>
                <td data-label="单位固定" style="text-align: center"><span class="text-muted">-</span></td>
                <td data-label="个人固定" style="text-align: center"><span class="text-muted">-</span></td>
                <td data-label="单位比例" style="text-align: center"><div>${(fundRate * 100).toFixed(0)}%</div><div class="rate">${companyFundTotal.toFixed(2)}</div></td>
                <td data-label="个人比例" style="text-align: center"><div>${(fundRate * 100).toFixed(0)}%</div><div class="rate">${personalFundTotal.toFixed(2)}</div></td>
                <td data-label="存缴金额" style="text-align: right"><span class="amount">${(companyFundTotal + personalFundTotal).toFixed(2)}</span></td>
            `;
            tableBody.appendChild(fundRow);

            // 公积金合计行
            const fundTotalRow = document.createElement('tr');
            fundTotalRow.className = 'total-row';
            fundTotalRow.innerHTML = `
                <td data-label="项目" style="text-align: right; font-weight: 600;">公积金合计</td>
                <td data-label="单位缴费基数"><span class="text-muted">-</span></td>
                <td data-label="个人缴费基数"><span class="text-muted">-</span></td>
                <td data-label="单位固定" style="text-align: center"><span class="text-muted">-</span></td>
                <td data-label="个人固定" style="text-align: center"><span class="text-muted">-</span></td>
                <td data-label="单位比例" style="text-align: center"><div>${(fundRate * 100).toFixed(0)}%</div><div class="rate">${companyFundTotal.toFixed(2)}</div></td>
                <td data-label="个人比例" style="text-align: center"><div>${(fundRate * 100).toFixed(0)}%</div><div class="rate">${personalFundTotal.toFixed(2)}</div></td>
                <td data-label="存缴金额" style="text-align: right"><span class="amount">${(companyFundTotal + personalFundTotal).toFixed(2)}</span></td>
            `;
            tableBody.appendChild(fundTotalRow);
            }

            // 更新汇总数据
            const companyTotal = companySocialTotal + companyFundTotal;
            const personalTotal = personalSocialTotal + personalFundTotal;
            const total = companyTotal + personalTotal;

            // 更新申报工资显示
            const salaryDisplayValue = document.getElementById('salaryDisplayValue');
            if (salaryDisplayValue) {
                salaryDisplayValue.textContent = salary.toLocaleString();
            }

            // 动画更新金额
            animateValue('totalAmount', total, '¥ ');
            animateValue('companyTotal', companyTotal, '¥ ');
            animateValue('personalTotal', personalTotal, '¥ ');

            // 更新图表
            updateChart(companyTotal, personalTotal);

            // 更新图例
            document.getElementById('legendCompany').textContent = formatMoney(companyTotal);
            document.getElementById('legendPersonal').textContent = formatMoney(personalTotal);
        }

        function animateValue(elementId, endValue, prefix = '') {
            const element = document.getElementById(elementId);
            const startValue = parseFloat(element.textContent.replace(/[^0-9.-]/g, '')) || 0;
            const duration = 400;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                const currentValue = startValue + (endValue - startValue) * easeProgress;

                element.textContent = prefix + currentValue.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                element.classList.add('is-updating');

                if (progress < 1) {
                    requestAnimationFrame(update);
                } else {
                    setTimeout(() => element.classList.remove('is-updating'), 300);
                }
            }

            requestAnimationFrame(update);
        }

        function updateChart(company, personal) {
            const total = company + personal;
            const circumference = 2 * Math.PI * 40;

            document.getElementById('chartCircle1').style.strokeDasharray = `${(company / total) * circumference} ${circumference}`;
            document.getElementById('chartCircle2').style.strokeDasharray = `${(personal / total) * circumference} ${circumference}`;
            document.getElementById('chartCircle2').style.strokeDashoffset = -((company / total) * circumference);
            document.getElementById('chartTotal').textContent = '¥' + (company + personal).toLocaleString('zh-CN', { maximumFractionDigits: 0 });
        }

        function updatePolicyDisplay(region) {
            const policy = regionPolicies[region];
            if (!policy) return;

            const policyTitleEl = document.getElementById('policyTitle');
            const policyContentEl = document.getElementById('policyContent');
            const fundPolicyTitleEl = document.getElementById('fundPolicyTitle');
            const fundPolicyContentEl = document.getElementById('fundPolicyContent');

            if (policyTitleEl) policyTitleEl.textContent = `${policy.name} ${policy.year} 年社保政策`;

            if (policyContentEl) {
                const contentHtml = policy.rules.map(rule => `<p>• ${rule}</p>`).join('');
                policyContentEl.innerHTML = contentHtml;
            }

            // 更新公积金政策
            if (policy.fundRules) {
                if (fundPolicyTitleEl) fundPolicyTitleEl.textContent = `${policy.name} ${policy.year} 年公积金政策`;
                if (fundPolicyContentEl) {
                    const fundContentHtml = policy.fundRules.map(rule => `<p>• ${rule}</p>`).join('');
                    fundPolicyContentEl.innerHTML = fundContentHtml;
                }
            }

            baseRange.min = policy.minBase;
            baseRange.max = policy.maxBase;
        }

        function resetCalculator() {
            document.getElementById('salaryInput').value = '';
            document.getElementById('regionSelect').selectedIndex = 0;
            document.getElementById('socialScheme').selectedIndex = 0;
            document.getElementById('fundScheme').selectedIndex = 0;
            document.getElementById('dispatchUnit').selectedIndex = 0;
            document.getElementById('salaryError').textContent = '';
            document.getElementById('salaryInput').classList.remove('qy-input--error');

            updateCalculation();
            updatePolicyDisplay(document.getElementById('regionSelect').value);
            showToast('已重置计算器');
        }



        function generateShareLink() {
            const params = new URLSearchParams({
                region: document.getElementById('regionSelect').value,
                salary: document.getElementById('salaryInput').value,
                social: document.getElementById('socialScheme').value,
                fund: document.getElementById('fundScheme').value
            });

            const shareUrl = `${window.location.origin}${window.location.pathname}?${params.toString()}`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                showToast('分享链接已复制到剪贴板');
            });
        }

        function exportToPDF() {
            showToast('正在准备打印...');
            setTimeout(() => window.print(), 500);
        }



        // ========================================
        // 初始化应用
        // ========================================
        const app = new CalculatorApp();
    </script>
</body>
