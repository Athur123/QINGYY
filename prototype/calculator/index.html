<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>费用计算器 - 青阳云</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- 青阳云设计系统 -->
    <link rel="stylesheet" href="../../styles/qingyang-variables.css">
    <link rel="stylesheet" href="../../styles/qingyang-base.css">
    <link rel="stylesheet" href="../../styles/qingyang-components.css">
    <link rel="stylesheet" href="../../styles/qingyang-forms.css">
    <style>
        /* ========================================
           计算器页面专用样式
           ======================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--qy-font-primary);
            background: var(--qy-bg-secondary);
            color: var(--qy-text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .app-container { display: flex; min-height: 100vh; }

        /* 侧边栏 */
        .sidebar {
            width: 220px;
            background: var(--qy-bg-primary);
            border-right: 1px solid var(--qy-border-light);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: var(--qy-z-fixed);
            transition: transform var(--qy-transition-base);
        }

        .logo {
            padding: var(--qy-space-5) var(--qy-space-6);
            border-bottom: 1px solid var(--qy-border-light);
        }

        .logo h1 {
            font-size: var(--qy-font-size-lg);
            font-weight: var(--qy-font-bold);
            color: var(--qy-primary-600);
        }

        .nav-section {
            padding: var(--qy-space-4) 0;
            flex: 1;
            overflow-y: auto;
        }

        .nav-group {
            padding: var(--qy-space-3) var(--qy-space-5) var(--qy-space-1);
            font-size: var(--qy-font-size-xs);
            font-weight: var(--qy-font-semibold);
            color: var(--qy-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        .nav-tree { list-style: none; padding: 0 var(--qy-space-3); }
        .nav-item { margin-bottom: var(--qy-space-1); }

        .nav-link {
            display: flex;
            align-items: center;
            padding: var(--qy-space-2) var(--qy-space-3);
            border-radius: var(--qy-radius-md);
            cursor: pointer;
            color: var(--qy-text-secondary);
            font-size: var(--qy-font-size-sm);
            transition: all var(--qy-transition-fast);
        }

        .nav-link:hover { background: var(--qy-bg-secondary); color: var(--qy-text-primary); }
        .nav-link.active {
            background: var(--qy-primary-50);
            color: var(--qy-primary-600);
            font-weight: var(--qy-font-semibold);
        }

        .nav-link svg { margin-right: var(--qy-space-2); }

        /* 移动端菜单按钮 */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: var(--qy-space-4);
            left: var(--qy-space-4);
            z-index: calc(var(--qy-z-fixed) + 10);
            width: 40px;
            height: 40px;
            border-radius: var(--qy-radius-md);
            background: var(--qy-bg-primary);
            border: 1px solid var(--qy-border-light);
            box-shadow: var(--qy-shadow-md);
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }

        /* 筛选侧边栏 */
        .content-with-filter { display: flex; flex: 1; }

        .filter-sidebar {
            width: 280px;
            flex-shrink: 0;
            background: var(--qy-bg-primary);
            border-right: 1px solid var(--qy-border-light);
            padding: var(--qy-space-5) 0;
            overflow-y: auto;
            position: fixed;
            left: 220px;
            top: 0;
            bottom: 0;
            z-index: var(--qy-z-fixed);
            transition: transform var(--qy-transition-base);
        }

        .filter-section {
            padding: 0 var(--qy-space-4) var(--qy-space-4);
            border-bottom: 1px solid var(--qy-border-light);
            margin-bottom: var(--qy-space-4);
        }

        .filter-section:last-child { border-bottom: none; margin-bottom: 0; }

        .filter-section-title {
            font-size: var(--qy-font-size-xs);
            font-weight: var(--qy-font-semibold);
            color: var(--qy-text-primary);
            margin-bottom: var(--qy-space-3);
            display: flex;
            align-items: center;
            gap: var(--qy-space-2);
        }

        .filter-section-title svg { color: var(--qy-text-muted); }
        .filter-item { margin-bottom: var(--qy-space-3); }
        .filter-item:last-child { margin-bottom: 0; }

        .filter-label {
            font-size: var(--qy-font-size-xs);
            color: var(--qy-text-secondary);
            margin-bottom: var(--qy-space-1);
            display: block;
        }

        /* 移动端筛选触发按钮 */
        .mobile-filter-trigger {
            display: none;
            position: fixed;
            bottom: var(--qy-space-6);
            left: 50%;
            transform: translateX(-50%);
            z-index: calc(var(--qy-z-fixed) + 5);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            margin-left: 500px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 头部 */
        .header {
            background: var(--qy-bg-primary);
            border-bottom: 1px solid var(--qy-border-light);
            padding: var(--qy-space-4) var(--qy-space-7);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: calc(var(--qy-z-fixed) - 10);
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: var(--qy-space-2);
            font-size: var(--qy-font-size-sm);
        }

        .breadcrumb a {
            color: var(--qy-text-muted);
            text-decoration: none;
            transition: color var(--qy-transition-fast);
        }
        .breadcrumb a:hover { color: var(--qy-primary-500); }
        .breadcrumb-separator { color: var(--qy-text-muted); }
        .breadcrumb-current { color: var(--qy-text-primary); font-weight: var(--qy-font-semibold); }

        .header-actions { display: flex; gap: var(--qy-space-3); }

        /* 内容区域 */
        .content-main {
            flex: 1;
            padding: var(--qy-space-6) var(--qy-space-7);
            max-width: 1000px;
        }

        /* 计算器头部 */
        .calc-header-section { margin-bottom: var(--qy-space-6); }

        .calc-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--qy-space-5);
        }

        .calc-title {
            font-size: var(--qy-font-size-2xl);
            font-weight: var(--qy-font-bold);
            color: var(--qy-text-primary);
            margin-bottom: var(--qy-space-1);
        }

        .calc-subtitle {
            font-size: var(--qy-font-size-sm);
            color: var(--qy-text-secondary);
        }

        /* 汇总与图表卡片 */
        .summary-chart-card {
            background: var(--qy-bg-primary);
            border-radius: var(--qy-radius-xl);
            box-shadow: var(--qy-shadow-card);
            padding: var(--qy-space-6);
            border: 1px solid var(--qy-border-light);
            animation: cardEnter 0.4s var(--qy-ease-out);
        }

        .summary-chart-content {
            display: flex;
            align-items: center;
            gap: var(--qy-space-10);
        }

        .summary-section { flex: 1; min-width: 280px; }

        .summary-title {
            font-size: var(--qy-font-size-sm);
            color: var(--qy-text-secondary);
            margin-bottom: var(--qy-space-3);
        }

        .summary-amount {
            font-size: 36px;
            font-weight: var(--qy-font-bold);
            color: var(--qy-text-primary);
            margin-bottom: var(--qy-space-4);
            font-variant-numeric: tabular-nums;
            transition: transform var(--qy-transition-fast);
        }

        .summary-amount.is-updating { animation: numberPulse 0.3s var(--qy-ease-bounce); }

        .summary-detail {
            display: flex;
            align-items: center;
            gap: var(--qy-space-4);
        }

        .summary-item {
            display: flex;
            flex-direction: column;
            gap: var(--qy-space-1);
        }

        .summary-item-label {
            font-size: var(--qy-font-size-xs);
            color: var(--qy-text-secondary);
        }

        .summary-item-value {
            font-size: var(--qy-font-size-sm);
            font-weight: var(--qy-font-semibold);
            color: var(--qy-text-primary);
            font-variant-numeric: tabular-nums;
        }

        .summary-divider {
            width: 1px;
            height: 30px;
            background: var(--qy-border-light);
        }

        /* 图表区域 */
        .chart-section {
            display: flex;
            align-items: center;
            gap: var(--qy-space-6);
            padding-left: var(--qy-space-10);
            border-left: 1px solid var(--qy-border-light);
        }

        .donut-chart {
            position: relative;
            width: 140px;
            height: 140px;
            flex-shrink: 0;
        }

        .donut-chart svg { transform: rotate(-90deg); }
        .donut-chart circle { transition: stroke-dasharray 0.6s var(--qy-ease-out); }

        .donut-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .donut-label {
            font-size: var(--qy-font-size-xs);
            color: var(--qy-text-muted);
            margin-bottom: var(--qy-space-1);
        }

        .donut-value {
            font-size: var(--qy-font-size-lg);
            font-weight: var(--qy-font-bold);
            color: var(--qy-text-primary);
            font-variant-numeric: tabular-nums;
        }

        .chart-legend {
            display: flex;
            flex-direction: column;
            gap: var(--qy-space-3);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: var(--qy-space-2);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: var(--qy-radius-sm);
        }

        .legend-text {
            font-size: var(--qy-font-size-sm);
            color: var(--qy-text-secondary);
        }

        .legend-value {
            margin-left: auto;
            font-weight: var(--qy-font-semibold);
            color: var(--qy-text-primary);
            font-variant-numeric: tabular-nums;
        }

        /* 结果卡片 */
        .result-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--qy-space-5);
            margin-bottom: var(--qy-space-5);
        }

        .result-card {
            background: var(--qy-bg-primary);
            border-radius: var(--qy-radius-xl);
            box-shadow: var(--qy-shadow-card);
            overflow: hidden;
            border: 1px solid var(--qy-border-light);
            animation: cardEnter 0.4s var(--qy-ease-out) 0.1s backwards;
        }

        .result-card:nth-child(2) { animation-delay: 0.2s; }

        .result-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--qy-space-4) var(--qy-space-5);
            background: var(--qy-bg-secondary);
            border-bottom: 1px solid var(--qy-border-light);
        }

        .result-card-title {
            display: flex;
            align-items: center;
            gap: var(--qy-space-2);
            font-size: var(--qy-font-size-base);
            font-weight: var(--qy-font-semibold);
            color: var(--qy-text-primary);
        }

        .result-card-subtitle {
            font-size: var(--qy-font-size-sm);
            color: var(--qy-text-secondary);
        }

        .base-amount {
            font-weight: 500;
        }

        .base-range {
            font-size: 11px;
            color: var(--qy-text-muted);
            margin-top: 2px;
        }

        /* 表格单元格内容居中 */
        .calc-table td[data-label="单位缴费基数"],
        .calc-table td[data-label="个人缴费基数"],
        .calc-table td[data-label="单位固定"],
        .calc-table td[data-label="个人固定"],
        .calc-table td[data-label="单位比例"],
        .calc-table td[data-label="个人比例"] {
            text-align: center;
        }

        .result-card-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--qy-radius-md);
            font-size: var(--qy-font-size-sm);
            font-weight: var(--qy-font-bold);
        }

        .social-icon { background: var(--qy-primary-50); color: var(--qy-primary-600); }
        .fund-icon { background: var(--qy-success-50); color: var(--qy-success-600); }

        .result-card-body { padding: 0; }

        /* 表格样式 */
        .calc-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--qy-font-size-xs);
            table-layout: fixed;
        }

        .calc-table th {
            padding: var(--qy-space-3) var(--qy-space-2);
            text-align: left;
            font-weight: var(--qy-font-semibold);
            color: var(--qy-text-secondary);
            background: var(--qy-bg-secondary);
            border-bottom: 1px solid var(--qy-border-light);
        }

        .calc-table th:first-child { width: 8%; padding-left: var(--qy-space-4); }
        .calc-table th:nth-child(2) { width: 14%; text-align: center; }
        .calc-table th:nth-child(3) { width: 14%; text-align: center; }
        .calc-table th:nth-child(4),
        .calc-table th:nth-child(5) { width: 11%; text-align: center; }
        .calc-table th:nth-child(6),
        .calc-table th:nth-child(7) { width: 14%; text-align: center; }
        .calc-table th:last-child { width: 14%; text-align: right; padding-right: var(--qy-space-4); }

        .calc-table td {
            padding: var(--qy-space-2);
            border-bottom: 1px solid var(--qy-border-light);
            color: var(--qy-text-primary);
        }

        .calc-table td:first-child { padding-left: var(--qy-space-4); }
        .calc-table td:last-child { padding-right: var(--qy-space-4); }
        .calc-table tr:hover { background: var(--qy-bg-secondary); }
        .calc-table tr:last-child td { border-bottom: none; }

        /* 险种标签 */
        .ins-type-badge {
            display: inline-flex;
            align-items: center;
            padding: var(--qy-space-1) var(--qy-space-2);
            font-size: 10px;
            font-weight: var(--qy-font-medium);
            border-radius: var(--qy-radius-full);
        }

        .badge-social { background: var(--qy-primary-50); color: var(--qy-primary-600); }
        .badge-fund { background: var(--qy-success-50); color: var(--qy-success-600); }

        /* 金额样式 */
        .amount {
            font-variant-numeric: tabular-nums;
            font-weight: var(--qy-font-medium);
        }

        .amount-unit {
            font-size: 10px;
            color: var(--qy-text-muted);
            margin-left: 1px;
        }

        .rate {
            color: var(--qy-text-muted);
            font-size: 10px;
        }

        .text-muted { color: var(--qy-text-muted); font-size: var(--qy-font-size-xs); }

        /* 合计行 */
        .total-row {
            background: var(--qy-primary-50) !important;
            font-weight: var(--qy-font-semibold);
        }

        .total-row td { color: var(--qy-primary-700) !important; }

        /* 计费方式标签 */
        .billing-badge {
            display: inline-block;
            padding: 2px 6px;
            background: var(--qy-primary-50);
            color: var(--qy-primary-700);
            font-size: 10px;
            font-weight: var(--qy-font-medium);
            border-radius: var(--qy-radius-sm);
            border: 1px solid var(--qy-primary-200);
        }

        .amount-fixed {
            font-size: 10px;
            font-weight: var(--qy-font-medium);
            color: var(--qy-primary-600);
            background: var(--qy-primary-50);
            padding: 2px 6px;
            border-radius: var(--qy-radius-sm);
            display: inline-block;
        }

        .fixed-rate {
            font-size: 10px;
            color: var(--qy-text-secondary);
            margin-bottom: 1px;
        }

        /* 政策卡片 */
        .policy-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--qy-space-5);
            margin-bottom: var(--qy-space-5);
            animation: cardEnter 0.4s var(--qy-ease-out) 0.3s backwards;
        }

        .policy-card {
            background: var(--qy-bg-primary);
            border-radius: var(--qy-radius-xl);
            box-shadow: var(--qy-shadow-card);
            padding: var(--qy-space-5);
            border: 1px solid var(--qy-border-light);
            border-left: 4px solid var(--qy-warning-500);
        }

        .policy-card--fund {
            border-left-color: var(--qy-success-500);
        }

        .policy-header {
            display: flex;
            align-items: center;
            gap: var(--qy-space-2);
            margin-bottom: var(--qy-space-3);
        }

        .policy-icon {
            width: 20px;
            height: 20px;
            color: var(--qy-warning-500);
        }

        .policy-icon--fund {
            color: var(--qy-success-500);
        }

        .policy-title {
            font-size: var(--qy-font-size-sm);
            font-weight: var(--qy-font-semibold);
            color: var(--qy-text-primary);
            flex: 1;
        }

        .policy-content {
            font-size: var(--qy-font-size-sm);
            color: var(--qy-text-secondary);
            line-height: 1.8;
        }

        .policy-content p { margin-bottom: var(--qy-space-1); }

        .policy-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: var(--qy-space-3);
        }

        .policy-link {
            display: inline-flex;
            align-items: center;
            gap: var(--qy-space-1);
            font-size: var(--qy-font-size-sm);
            color: var(--qy-primary-600);
            text-decoration: none;
            font-weight: var(--qy-font-medium);
        }

        .policy-link:hover { text-decoration: underline; }

        /* 操作栏 */
        .action-bar {
            display: flex;
            gap: var(--qy-space-3);
            margin-top: var(--qy-space-5);
            padding-top: var(--qy-space-5);
            border-top: 1px solid var(--qy-border-light);
            animation: cardEnter 0.4s var(--qy-ease-out) 0.4s backwards;
        }

        /* 快捷工资按钮 */
        .quick-salary {
            display: flex;
            gap: var(--qy-space-2);
            flex-wrap: wrap;
            margin-top: var(--qy-space-2);
        }

        .quick-salary-btn {
            display: inline-flex;
            align-items: center;
            gap: var(--qy-space-1);
            padding: var(--qy-space-2) var(--qy-space-3);
            font-size: var(--qy-font-size-xs);
            color: var(--qy-primary-600);
            background: var(--qy-bg-primary);
            border: 1px solid var(--qy-primary-200);
            border-radius: var(--qy-radius-md);
            cursor: pointer;
            transition: all var(--qy-transition-fast);
        }

        .quick-salary-btn:hover {
            background: var(--qy-primary-500);
            color: white;
            border-color: var(--qy-primary-500);
            transform: translateY(-1px);
        }

        /* 历史记录抽屉 */
        .history-drawer {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 380px;
            background: var(--qy-bg-primary);
            border-left: 1px solid var(--qy-border-light);
            box-shadow: var(--qy-shadow-xl);
            transform: translateX(100%);
            transition: transform var(--qy-transition-base);
            z-index: var(--qy-z-modal);
            display: flex;
            flex-direction: column;
        }

        .history-drawer.is-open { transform: translateX(0); }

        .history-drawer__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--qy-space-4) var(--qy-space-5);
            border-bottom: 1px solid var(--qy-border-light);
        }

        .history-drawer__header h3 {
            font-size: var(--qy-font-size-base);
            font-weight: var(--qy-font-semibold);
        }

        .history-drawer__list {
            flex: 1;
            overflow-y: auto;
            padding: var(--qy-space-3);
        }

        .history-item {
            padding: var(--qy-space-4);
            border-radius: var(--qy-radius-lg);
            margin-bottom: var(--qy-space-3);
            cursor: pointer;
            transition: all var(--qy-transition-fast);
            border: 1px solid var(--qy-border-light);
        }

        .history-item:hover {
            background: var(--qy-bg-secondary);
            border-color: var(--qy-primary-200);
        }

        .history-item__header {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--qy-space-2);
        }

        .history-item__region {
            font-weight: var(--qy-font-semibold);
            color: var(--qy-text-primary);
            font-size: var(--qy-font-size-sm);
        }

        .history-item__time {
            font-size: var(--qy-font-size-xs);
            color: var(--qy-text-muted);
        }

        .history-item__details {
            display: flex;
            gap: var(--qy-space-4);
            font-size: var(--qy-font-size-xs);
            color: var(--qy-text-secondary);
        }

        .history-item__amount {
            color: var(--qy-primary-600);
            font-weight: var(--qy-font-semibold);
            font-size: var(--qy-font-size-sm);
            margin-top: var(--qy-space-2);
        }

        .history-empty {
            text-align: center;
            padding: var(--qy-space-10);
            color: var(--qy-text-muted);
        }

        /* 方案对比区域 */
        .compare-section {
            background: var(--qy-bg-primary);
            border-radius: var(--qy-radius-xl);
            box-shadow: var(--qy-shadow-card);
            padding: var(--qy-space-5);
            border: 1px solid var(--qy-border-light);
            margin-bottom: var(--qy-space-5);
            animation: cardEnter 0.4s var(--qy-ease-out) 0.35s backwards;
        }

        .compare-section.is-hidden { display: none; }

        .compare-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--qy-space-4);
        }

        .compare-header h3 {
            font-size: var(--qy-font-size-base);
            font-weight: var(--qy-font-semibold);
        }

        .compare-actions { display: flex; gap: var(--qy-space-2); }

        .compare-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--qy-font-size-sm);
            table-layout: fixed;
        }

        .compare-table th,
        .compare-table td {
            padding: var(--qy-space-3) var(--qy-space-3);
            text-align: center;
            border-bottom: 1px solid var(--qy-border-light);
            vertical-align: middle;
        }

        .compare-table th {
            font-weight: var(--qy-font-semibold);
            color: var(--qy-text-secondary);
            background: var(--qy-bg-secondary);
        }

        .compare-table th:first-child,
        .compare-table td:first-child {
            text-align: left;
            font-weight: var(--qy-font-medium);
        }

        .compare-table tr.highlight { background: var(--qy-bg-secondary); }
        .compare-table tr.highlight td { font-weight: var(--qy-font-semibold); }
        .compare-table tr.highlight td:first-child { font-weight: var(--qy-font-bold); }

        /* 加载遮罩 */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: var(--qy-z-modal);
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--qy-transition-fast), visibility var(--qy-transition-fast);
        }

        .loading-overlay.is-visible {
            opacity: 1;
            visibility: visible;
        }

        .loading-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--qy-space-4);
            padding: var(--qy-space-8);
            background: var(--qy-bg-primary);
            border-radius: var(--qy-radius-xl);
            box-shadow: var(--qy-shadow-xl);
        }

        .loading-text {
            color: var(--qy-text-secondary);
            font-size: var(--qy-font-size-sm);
        }

        /* 遮罩层 */
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: calc(var(--qy-z-fixed) + 5);
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--qy-transition-base), visibility var(--qy-transition-base);
        }

        .drawer-overlay.is-visible {
            opacity: 1;
            visibility: visible;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: var(--qy-space-6);
            right: var(--qy-space-6);
            padding: var(--qy-space-3) var(--qy-space-5);
            background: var(--qy-text-primary);
            color: white;
            border-radius: var(--qy-radius-lg);
            font-size: var(--qy-font-size-sm);
            box-shadow: var(--qy-shadow-xl);
            opacity: 0;
            transform: translateY(20px);
            transition: all var(--qy-transition-base);
            z-index: var(--qy-z-toast);
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* 表单错误提示 */
        .form-error {
            color: var(--qy-error-500);
            font-size: var(--qy-font-size-xs);
            margin-top: var(--qy-space-1);
        }

        /* 动画 */
        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes rowEnter {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes numberPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .animate-shake { animation: shake 0.4s ease-in-out; }

        /* ========================================
           响应式适配
           ======================================== */

        /* 平板端 (768px - 1023px) */
        @media (max-width: 1023px) {
            .sidebar { width: 64px; }
            .logo h1 { display: none; }
            .nav-group { display: none; }
            .nav-link {
                justify-content: center;
                padding: var(--qy-space-3);
            }
            .nav-link span { display: none; }
            .nav-link svg { margin-right: 0; }

            .filter-sidebar {
                left: 64px;
                transform: translateX(-100%);
                z-index: calc(var(--qy-z-fixed) + 10);
            }
            .filter-sidebar.is-open { transform: translateX(0); }
            .main-content { margin-left: 64px; }
            .mobile-filter-trigger { display: block; }
        }

        /* 移动端 (< 768px) */
        @media (max-width: 767px) {
            .mobile-menu-btn { display: flex; }

            .sidebar {
                width: 280px;
                transform: translateX(-100%);
                z-index: calc(var(--qy-z-fixed) + 20);
            }
            .sidebar.is-open { transform: translateX(0); }
            .logo h1 { display: block; }
            .nav-group { display: block; }
            .nav-link {
                justify-content: flex-start;
                padding: var(--qy-space-2) var(--qy-space-3);
            }
            .nav-link span { display: inline; }
            .nav-link svg { margin-right: var(--qy-space-2); }

            .filter-sidebar {
                left: 0;
                width: 100%;
                max-height: 70vh;
                top: auto;
                bottom: 0;
                border-radius: var(--qy-radius-xl) var(--qy-radius-xl) 0 0;
                transform: translateY(100%);
            }
            .filter-sidebar.is-open { transform: translateY(0); }

            .main-content { margin-left: 0; }

            .header {
                padding: var(--qy-space-3) var(--qy-space-4);
                padding-left: 60px;
            }

            .content-main { padding: var(--qy-space-4); }
            .calc-title { font-size: var(--qy-font-size-xl); }

            .summary-chart-content {
                flex-direction: column;
                gap: var(--qy-space-6);
            }

            .chart-section {
                padding-left: 0;
                padding-top: var(--qy-space-6);
                border-left: none;
                border-top: 1px solid var(--qy-border-light);
                width: 100%;
                justify-content: center;
            }

            .result-section { grid-template-columns: 1fr; }
            .summary-detail { flex-wrap: wrap; }
            .summary-divider { display: none; }

            .action-bar { flex-direction: column; }
            .action-bar .qy-btn {
                width: 100%;
                justify-content: center;
            }

            .history-drawer { width: 100%; }

            /* 表格卡片化 */
            .calc-table thead { display: none; }
            .calc-table tbody,
            .calc-table tr { display: block; }
            .calc-table tr {
                padding: var(--qy-space-3);
                border-bottom: 1px solid var(--qy-border-light);
            }
            .calc-table td {
                display: flex;
                justify-content: space-between;
                padding: var(--qy-space-2) 0;
                border-bottom: none;
            }
            .calc-table td::before {
                content: attr(data-label);
                font-weight: var(--qy-font-semibold);
                color: var(--qy-text-secondary);
            }

            .compare-table { font-size: var(--qy-font-size-xs); }
            .compare-table th,
            .compare-table td { padding: var(--qy-space-2); }

            /* 政策卡片移动端堆叠 */
            .policy-section {
                grid-template-columns: 1fr;
            }
        }

        /* 打印样式 */
        @media print {
            .sidebar,
            .filter-sidebar,
            .mobile-menu-btn,
            .mobile-filter-trigger,
            .header-actions,
            .action-bar,
            .drawer-overlay,
            .history-drawer {
                display: none !important;
            }
            .main-content { margin-left: 0 !important; }
            .content-main {
                max-width: none;
                padding: 0;
            }
            .result-card,
            .policy-section,
            .policy-card,
            .summary-chart-card {
                box-shadow: none;
                border: 1px solid #ddd;
                break-inside: avoid;
            }
        }
    </style>
</head>

                ]

        let baseRange = { min: 4357, max: 26010 };

        // ========================================
        // 工具函数
        // ========================================
        function formatMoney(amount) {
            return '¥ ' + amount.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function calculateBase(salary) {
            if (salary < baseRange.min) return baseRange.min;
            if (salary > baseRange.max) return baseRange.max;
            return salary;
        }

        // ========================================
        // 历史记录管理器
        // ========================================
        class CalculatorHistory {
            constructor() {
                this.storageKey = 'qy_calculator_history';
                this.maxItems = 10;
            }

            add(record) {
                const history = this.getAll();
                const newRecord = {
                    id: Date.now(),
                    timestamp: new Date().toISOString(),
                    region: record.region,
                    regionName: record.regionName,
                    salary: record.salary,
                    socialScheme: record.socialScheme,
                    fundScheme: record.fundScheme,
                    results: record.results
                };

                // 检查是否已存在相同条件的记录
                const exists = history.some(h =>
                    h.region === newRecord.region &&
                    h.salary === newRecord.salary &&
                    h.fundScheme === newRecord.fundScheme
                );

                if (exists) return null;

                history.unshift(newRecord);
                if (history.length > this.maxItems) {
                    history.pop();
                }

                localStorage.setItem(this.storageKey, JSON.stringify(history));
                return newRecord;
            }

            getAll() {
                const data = localStorage.getItem(this.storageKey);
                return data ? JSON.parse(data) : [];
            }

            clear() {
                localStorage.removeItem(this.storageKey);
            }

            restore(id) {
                const record = this.getAll().find(item => item.id === id);
                if (record) {
                    document.getElementById('regionSelect').value = record.region;
                    document.getElementById('salaryInput').value = record.salary;
                    document.getElementById('socialScheme').value = record.socialScheme;
                    document.getElementById('fundScheme').value = record.fundScheme;
                    updateCalculation();
                    showToast('已恢复历史记录');
                }
            }
        }

        // ========================================
        // 方案对比管理器
        // ========================================
        class CalculatorCompare {
            constructor() {
                this.scenarios = [];
                this.maxScenarios = 5;
                this.baseScenarioId = null; // 基准方案ID
            }

            // 添加基准方案（当前方案，不可删除）
            addBaseScenario() {
                const salary = parseFloat(document.getElementById('salaryInput').value) || 0;

                const socialScheme = document.getElementById('socialScheme').value;
                const fundScheme = document.getElementById('fundScheme').value;

                // 不允许同时为空
                if (!socialScheme && !fundScheme) {
                    showToast('请至少选择社保方案或公积金方案', 'warning');
                    return;
                }

                const scenario = {
                    id: 'base', // 固定ID表示基准方案
                    name: '当前方案',
                    isBase: true, // 标记为基准方案
                    region: document.getElementById('regionSelect').value,
                    regionName: document.getElementById('regionSelect').selectedOptions[0].text,
                    salary: salary,
                    socialScheme: document.getElementById('socialScheme').value,
                    socialSchemeName: document.getElementById('socialScheme').selectedOptions[0].text,
                    fundScheme: document.getElementById('fundScheme').value,
                    fundSchemeName: document.getElementById("fundScheme").selectedOptions[0].text,
                    results: null
                };

                // 使用 calculateScenarioResults 计算完整结果（包含社保/公积金合计）
                scenario.results = this.calculateScenarioResults(scenario);

                this.baseScenarioId = 'base';
                // 如果已有基准方案，先移除
                this.scenarios = this.scenarios.filter(s => !s.isBase);
                this.scenarios.unshift(scenario); // 添加到第一个位置
                this.renderComparison();
            }

            // 添加对比方案（社保方案和公积金方案默认为空）
            addScenario() {
                if (this.scenarios.length >= this.maxScenarios) {
                    showToast('最多只能对比5个方案', 'warning');
                    return false;
                }

                const salary = parseFloat(document.getElementById('salaryInput').value) || 0;
                if (salary <= 0) {
                    showToast('请先输入工资金额');
                    return false;
                }

                // 检查是否已有基准方案
                if (!this.scenarios.find(s => s.isBase)) {
                    this.addBaseScenario();
                }

                // 创建对比方案，社保和公积金方案默认为空
                const scenario = {
                    id: Date.now(),
                    name: `对比方案 ${this.scenarios.filter(s => !s.isBase).length + 1}`,
                    isBase: false,
                    region: document.getElementById('regionSelect').value,
                    regionName: document.getElementById('regionSelect').selectedOptions[0].text,
                    salary: salary,
                    socialScheme: '', // 默认空值
                    socialSchemeName: '请选择社保方案',
                    fundScheme: '', // 默认空值
                    fundSchemeName: '请选择公积金方案',
                    results: null
                };

                this.scenarios.push(scenario);
                this.renderComparison();
                showToast('已添加对比方案');
                return true;
            }

            // 添加空的对比方案（社保方案和公积金方案为空）
            addEmptyScenario() {
                if (this.scenarios.length >= this.maxScenarios) {
                    return false;
                }

                const salary = parseFloat(document.getElementById('salaryInput').value) || 0;

                const scenario = {
                    id: Date.now(),
                    name: `对比方案 ${this.scenarios.filter(s => !s.isBase).length + 1}`,
                    isBase: false,
                    region: document.getElementById('regionSelect').value,
                    regionName: document.getElementById('regionSelect').selectedOptions[0].text,
                    salary: salary,
                    socialScheme: '', // 空的社保方案
                    socialSchemeName: '请选择社保方案',
                    fundScheme: '', // 空的公积金方案
                    fundSchemeName: '请选择公积金方案',
                    results: null
                };

                this.scenarios.push(scenario);
                return true;
            }

            // 更新对比方案的社保和公积金选择（即时渲染）
            updateScenario(scenarioId, type, value) {
                const scenario = this.scenarios.find(s => s.id === scenarioId);
                if (!scenario || scenario.isBase) return false;

                if (type === 'social') {
                    const socialSelect = document.getElementById('socialScheme');
                    const socialName = Array.from(socialSelect.options).find(o => o.value === value)?.text || value;
                    scenario.socialScheme = value;
                    scenario.socialSchemeName = socialName;
                } else if (type === 'fund') {
                    const fundSelect = document.getElementById('fundScheme');
                    const fundName = Array.from(fundSelect.options).find(o => o.value === value)?.text || value;
                    scenario.fundScheme = value;
                    scenario.fundSchemeName = fundName;
                } else if (type === 'region') {
                    const regionSelect = document.getElementById('regionSelect');
                    const regionName = Array.from(regionSelect.options).find(o => o.value === value)?.text || (value ? value : '请选择地区');
                    scenario.region = value;
                    scenario.regionName = regionName;
                }

                // 即时计算
                scenario.results = this.calculateScenarioResults(scenario);

                // 检查是否同时为空
                if (!scenario.socialScheme && !scenario.fundScheme) {
                    // 标记结果为无效
                    scenario.results = null;
                    showToast('请至少选择社保方案或公积金方案', 'warning');
                }

                // 局部更新，避免全量渲染导致闪烁
                this.updateScenarioRow(scenarioId);
                return true;
            }

            // 局部更新指定方案的显示行
            updateScenarioRow(scenarioId) {
                const scenario = this.scenarios.find(s => s.id === scenarioId);
                if (!scenario || !scenario.results) return;

                const baseScenario = this.scenarios.find(s => s.isBase);
                const baseResults = baseScenario?.results;
                const baseCompany = baseResults ? parseFloat(baseResults.companyTotal.replace(/[^0-9.-]/g, '')) : 0;
                const basePersonal = baseResults ? parseFloat(baseResults.personalTotal.replace(/[^0-9.-]/g, '')) : 0;

                // 找到该方案对应的列索引
                const scenarioIndex = this.scenarios.findIndex(s => s.id === scenarioId);
                if (scenarioIndex === -1) return;

                // 更新单位应缴
                const companyValue = parseFloat(scenario.results.companyTotal.replace(/[^0-9.-]/g, ''));
                const companyDiff = companyValue - baseCompany;
                const companyCell = document.querySelector(`tr[data-row="company"] td:nth-child(${scenarioIndex + 2})`);
                if (companyCell) {
                    companyCell.innerHTML = this.renderCellContent(scenario.results.companyTotal, companyDiff, 'var(--qy-primary-600)', false);
                }

                // 更新个人应缴
                const personalValue = parseFloat(scenario.results.personalTotal.replace(/[^0-9.-]/g, ''));
                const personalDiff = personalValue - basePersonal;
                const personalCell = document.querySelector(`tr[data-row="personal"] td:nth-child(${scenarioIndex + 2})`);
                if (personalCell) {
                    personalCell.innerHTML = this.renderCellContent(scenario.results.personalTotal, personalDiff, 'var(--qy-success-600)', false);
                }

                // 更新社保+公积金合计
                const socialValue = parseFloat(scenario.results.socialTotal.replace(/[^0-9.-]/g, ''));
                const fundValue = parseFloat(scenario.results.fundTotal.replace(/[^0-9.-]/g, ''));
                const baseSocialTotal = baseResults ? parseFloat(baseResults.socialTotal.replace(/[^0-9.-]/g, '')) : 0;
                const baseFundTotal = baseResults ? parseFloat(baseResults.fundTotal.replace(/[^0-9.-]/g, '')) : 0;
                const combinedTotal = socialValue + fundValue;
                const baseCombined = baseSocialTotal + baseFundTotal;
                const combinedDiff = combinedTotal - baseCombined;
                const combinedCell = document.querySelector(`tr[data-row="combined"] td:nth-child(${scenarioIndex + 2})`);
                if (combinedCell) {
                    const diffClass = combinedDiff > 0 ? 'var(--qy-error-500)' : (combinedDiff < 0 ? 'var(--qy-success-500)' : 'var(--qy-text-muted)');
                    const diffSign = combinedDiff > 0 ? '+' : '';
                    combinedCell.innerHTML = `
                        <div style="color: var(--qy-text-primary);">${formatMoney(combinedTotal)}</div>
                        <div style="font-size: 11px; color: ${diffClass}; margin-top: 2px;">${diffSign}${combinedDiff.toFixed(2)}</div>
                    `;
                }

                // 更新年度差额统计
                this.updateYearlyStats(scenarioIndex, scenario.results, baseResults);
            }

            // 渲染单元格内容
            renderCellContent(value, diff, color, isBold) {
                if (!diff || diff === 0) {
                    return `<div style="color: ${color}; ${isBold ? 'font-weight: 600;' : ''}">${value}</div>`;
                }
                const diffClass = diff > 0 ? 'var(--qy-error-500)' : 'var(--qy-success-500)';
                const diffSign = diff > 0 ? '+' : '';
                return `
                    <div style="color: ${color}; ${isBold ? 'font-weight: 600;' : ''}">${value}</div>
                    <div style="font-size: 11px; color: ${diffClass}; margin-top: 2px;">${diffSign}${diff.toFixed(2)}</div>
                `;
            }

            // 更新年度差额统计
            updateYearlyStats(index, results, baseResults) {
                const yearlyRow = document.querySelector('tr[data-row="yearly"]');
                if (!yearlyRow) return;

                const cell = yearlyRow.querySelector(`td:nth-child(${index + 2})`);
                if (!cell) return;

                const personal = parseFloat(results.personalTotal.replace(/[^0-9.-]/g, ''));
                const company = parseFloat(results.companyTotal.replace(/[^0-9.-]/g, ''));

                let basePersonal = 0, baseCompany = 0;
                if (baseResults) {
                    basePersonal = parseFloat(baseResults.personalTotal.replace(/[^0-9.-]/g, ''));
                    baseCompany = parseFloat(baseResults.companyTotal.replace(/[^0-9.-]/g, ''));
                }

                const personalYearlyDiff = (personal - basePersonal) * 12;
                const companyYearlyDiff = (company - baseCompany) * 12;

                const formatYearly = (val) => {
                    const prefix = val > 0 ? '+' : (val < 0 ? '-' : '');
                    const color = val > 0 ? 'var(--qy-error-500)' : (val < 0 ? 'var(--qy-success-500)' : 'var(--qy-text-muted)');
                    return `<span style="color: ${color};">${prefix}¥${Math.abs(val).toLocaleString()}</span>`;
                };

                cell.innerHTML = `
                    <div style="font-size: 11px; line-height: 1.6;">
                        <div>个人年缴: ${formatYearly(personalYearlyDiff)}</div>
                        <div>单位年缴: ${formatYearly(companyYearlyDiff)}</div>

                    </div>
                `;
            }

            // 计算指定方案的结果
            calculateScenarioResults(scenario) {
                // 如果地区为空，不计算
                if (!scenario.region) {
                    return null;
                }

                // 保存当前值
                const currentSocialScheme = document.getElementById('socialScheme').value;
                const currentFundScheme = document.getElementById('fundScheme').value;

                try {
                    // 临时设置方案值进行计算
                    document.getElementById('socialScheme').value = scenario.socialScheme;
                    document.getElementById('fundScheme').value = scenario.fundScheme;

                    // 获取基数
                    const salary = scenario.salary || 0;
                    const base = calculateBase(salary);
                    
                    // 处理无效的公积金比例（默认为0）
                    const fundRateVal = parseFloat(scenario.fundScheme);
                    const fundRate = isNaN(fundRateVal) ? 0 : fundRateVal / 100;

                    // 计算社保
                    let companySocialTotal = 0;
                    let personalSocialTotal = 0;

                    for (const [key, config] of Object.entries(insuranceConfig)) {
                        if (config.type === 'social') {
                            let companyAmount, personalAmount;
                            if (config.billingType === 'rate') {
                                companyAmount = base * config.companyRate;
                                personalAmount = base * config.personalRate;
                            } else if (config.billingType === 'fixed_yearly') {
                                companyAmount = (config.companyFixed || 0) / 12;
                                personalAmount = (config.personalFixed || 0) / 12;
                            }
                            companySocialTotal += companyAmount;
                            personalSocialTotal += personalAmount;
                        }
                    }

                    // 计算公积金
                    const companyFundTotal = base * fundRate;
                    const personalFundTotal = base * fundRate;

                    // 汇总
                    const companyTotal = companySocialTotal + companyFundTotal;
                    const personalTotal = personalSocialTotal + personalFundTotal;
                    const total = companyTotal + personalTotal;

                    return {
                        companyTotal: formatMoney(companyTotal),
                        personalTotal: formatMoney(personalTotal),
                        total: formatMoney(total),
                        // 社保合计
                        companySocial: formatMoney(companySocialTotal),
                        personalSocial: formatMoney(personalSocialTotal),
                        socialTotal: formatMoney(companySocialTotal + personalSocialTotal),
                        // 公积金合计
                        companyFund: formatMoney(companyFundTotal),
                        personalFund: formatMoney(personalFundTotal),
                        fundTotal: formatMoney(companyFundTotal + personalFundTotal)
                    };
                } finally {
                    // 确保恢复当前值
                    document.getElementById('socialScheme').value = currentSocialScheme;
                    document.getElementById('fundScheme').value = currentFundScheme;
                }
            }

            captureResults() {
                return {
                    companyTotal: document.getElementById('companyTotal').textContent,
                    personalTotal: document.getElementById('personalTotal').textContent,
                    
                    total: document.getElementById('totalAmount').textContent
                };
            }

            renderComparison() {
                const container = document.getElementById('compareContainer');
                if (this.scenarios.length === 0) {
                    container.innerHTML = '<div style="text-align: center; color: var(--qy-text-muted); padding: 20px;">暂无对比方案，点击"添加对比方案"添加不同方案的对比</div>';
                    return;
                }

                // 获取社保和公积金选项，添加"请选择"空选项

                    .map(o => `<option value="${o.value}">${o.text}</option>`).join('');
                const fundOptions = Array.from(document.getElementById('fundScheme').options)
                    .map(o => `<option value="${o.value}">${o.text}</option>`).join('');
                const regionOptions = Array.from(document.getElementById('regionSelect').options)
                    .map(o => `<option value="${o.value}">${o.text}</option>`).join('');
                const socialOptionsWithEmpty = '<option value="">请选择社保方案</option>' + socialOptions;

                                        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
                                            <div style="display: flex; align-items: center; gap: 4px; font-weight: 600; font-size: 14px;">
                                                ${s.isBase ? '<span style="color: var(--qy-primary-500);">★</span>' : ''}
                                                <span>${s.name}</span>
                                            </div>
                                            ${!s.isBase
                                                ? `<div style="display: flex; gap: 4px;">
                                                    <button onclick="app.applyCompareScenario(${s.id})" class="qy-btn qy-btn--primary qy-btn--sm" style="padding: 2px 8px; height: auto; font-size: 11px;">应用方案</button>
                                                    <button onclick="app.removeCompareScenario(${s.id})" class="qy-btn qy-btn--text qy-btn--sm" style="padding: 2px 8px; height: auto; font-size: 11px; color: var(--qy-error-500);">删除</button>
                                                </div>`

                                        </div>
                                    </th>

                        </thead>
                        <tbody>
                            <tr>
                                <td>参保地区</td>
                                ${this.scenarios.map(s => {
                                    if (s.isBase) {
                                        return `<td>${s.regionName}</td>`;
                                    } else {
                                        const selectedRegion = s.region || '';
                                        return `<td>
                                            <select class="qy-input qy-input--sm" onchange="app.updateCompareScenario(${s.id}, 'region', this.value)" style="min-width: 120px; font-size: 12px; padding: 4px 8px;">
                                                ${regionOptionsWithEmpty.replace(`value="${selectedRegion}"`, `value="${selectedRegion}" selected`)}
                                            </select>
                                        </td>`;
                                    }
                                }).join('')}
                            </tr>
                            <tr>
                                <td>社保方案</td>
                                ${this.scenarios.map(s => {
                                    if (s.isBase) {
                                        return `<td>${s.socialSchemeName}</td>`;
                                    } else {
                                        const selectedSocial = s.socialScheme || '';
                                        return `<td>
                                            <select class="qy-input qy-input--sm" onchange="app.updateCompareScenario(${s.id}, 'social', this.value)" style="min-width: 120px; font-size: 12px; padding: 4px 8px;">
                                                ${socialOptionsWithEmpty.replace(`value="${selectedSocial}"`, `value="${selectedSocial}" selected`)}
                                            </select>
                                        </td>`;
                                    }
                                }).join('')}
                            </tr>
                            <tr>
                                <td>公积金方案</td>
                                ${this.scenarios.map(s => {
                                    if (s.isBase) {
                                        return `<td>${s.fundScheme}%</td>`;
                                    } else {
                                        const selectedFund = s.fundScheme || '';
                                        return `<td>
                                            <select class="qy-input qy-input--sm" onchange="app.updateCompareScenario(${s.id}, 'fund', this.value)" style="min-width: 100px; font-size: 12px; padding: 4px 8px;">
                                                ${fundOptionsWithEmpty.replace(`value="${selectedFund}"`, `value="${selectedFund}" selected`)}
                                            </select>
                                        </td>`;
                                    }
                                }).join('')}
                            </tr>
                            <tr>
                                <td>申报工资</td>
                                ${this.scenarios.map(s => `<td>¥${s.salary.toLocaleString()}</td>`).join('')}
                            </tr>
                            <!-- 获取基准方案用于计算变化 -->
                            ${(() => {
                                const baseScenario = this.scenarios.find(s => s.isBase);
                                const baseResults = baseScenario?.results;
                                const baseCompany = baseResults ? parseFloat(baseResults.companyTotal.replace(/[^0-9.-]/g, '')) : 0;
                                const basePersonal = baseResults ? parseFloat(baseResults.personalTotal.replace(/[^0-9.-]/g, '')) : 0;

                                return `
                            <tr class="highlight" data-row="company">
                                <td>单位应缴</td>
                                ${this.scenarios.map(s => {
                                    if (!s.results) return '<td>-</td>';
                                    const value = parseFloat(s.results.companyTotal.replace(/[^0-9.-]/g, ''));

                                        return `<td style="color: var(--qy-primary-600);">${s.results.companyTotal}</td>`;
                                    }

                                    const diffClass = diff > 0 ? 'var(--qy-error-500)' : (diff < 0 ? 'var(--qy-success-500)' : 'var(--qy-text-muted)');
                                    const diffSign = diff > 0 ? '+' : '';
                                    return `<td style="color: var(--qy-primary-600);">
                                        ${s.results.companyTotal}
                                        <div style="font-size: 11px; color: ${diffClass}; margin-top: 2px;">${diffSign}${diff.toFixed(2)}</div>

                                        return `<td style="color: var(--qy-success-600);">${s.results.personalTotal}</td>`;
                                    }
                                    const diff = value - basePersonal;
                                    const diffClass = diff > 0 ? 'var(--qy-error-500)' : (diff < 0 ? 'var(--qy-success-500)' : 'var(--qy-text-muted)');
                                    const diffSign = diff > 0 ? '+' : '';
                                    return `<td style="color: var(--qy-success-600);">
                                        ${s.results.personalTotal}
                                        <div style="font-size: 11px; color: ${diffClass}; margin-top: 2px;">${diffSign}${diff.toFixed(2)}</div>
                                    </td>`;

                            <tr data-row="combined" style="background: var(--qy-bg-secondary);">
                                <td style="font-weight: 600;">社保+公积金合计</td>
                                ${this.scenarios.map(s => {
                                    if (!s.results) return '<td>-</td>';
                                    const socialVal = parseFloat(s.results.socialTotal.replace(/[^0-9.-]/g, ''));
                                    const fundVal = parseFloat(s.results.fundTotal.replace(/[^0-9.-]/g, ''));
                                    const combinedTotal = socialVal + fundVal;
                                    if (s.isBase || !baseResults) {
                                        return `<td style="font-weight: 600; color: var(--qy-text-primary);">${formatMoney(combinedTotal)}</td>`;
                                    }
                                    const baseCombined = baseSocialTotal + baseFundTotal;
                                    const diff = combinedTotal - baseCombined;
                                    const diffClass = diff > 0 ? 'var(--qy-error-500)' : (diff < 0 ? 'var(--qy-success-500)' : 'var(--qy-text-muted)');
                                    const diffSign = diff > 0 ? '+' : '';
                                    return `<td style="font-weight: 600;">
                                        <div style="color: var(--qy-text-primary);">${formatMoney(combinedTotal)}</div>
                                        <div style="font-size: 11px; color: ${diffClass}; margin-top: 2px;">${diffSign}${diff.toFixed(2)}</div>
                                    </td>`;
                                }).join('')}
                            </tr>
                            <!-- 年度差额统计行 -->
                            <tr data-row="yearly" style="background: linear-gradient(135deg, var(--qy-primary-50) 0%, var(--qy-success-50) 100%); border-top: 2px solid var(--qy-primary-200);">
                                <td style="font-weight: 600; color: var(--qy-primary-700);">
                                    <span style="display: flex; align-items: center; gap: 4px;">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--qy-primary-500);">
                                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                            <line x1="16" y1="2" x2="16" y2="6"></line>
                                            <line x1="8" y1="2" x2="8" y2="6"></line>
                                            <line x1="3" y1="10" x2="21" y2="10"></line>
                                        </svg>
                                        年度差额
                                    </span>
                                </td>
                                ${this.scenarios.map(s => {
                                    if (!s.results) return '<td>-</td>';
                                    const personal = parseFloat(s.results.personalTotal.replace(/[^0-9.-]/g, ''));
                                    const company = parseFloat(s.results.companyTotal.replace(/[^0-9.-]/g, ''));

                                    let basePersonal = 0, baseCompany = 0;
                                    if (baseResults) {
                                        basePersonal = parseFloat(baseResults.personalTotal.replace(/[^0-9.-]/g, ''));
                                        baseCompany = parseFloat(baseResults.companyTotal.replace(/[^0-9.-]/g, ''));
                                    }

                                    const personalYearlyDiff = (personal - basePersonal) * 12;
                                    const companyYearlyDiff = (company - baseCompany) * 12;
                    
                                    if (s.isBase || !baseResults) {
                                        return `<td style="font-size: 12px; color: var(--qy-text-secondary);">
                                            <div>个人: ${formatMoney(personal * 12)}</div>
                                            <div>单位: ${formatMoney(company * 12)}</div>
                                        </td>`;
                                    }

                                    const personalClass = personalYearlyDiff > 0 ? 'var(--qy-error-500)' : (personalYearlyDiff < 0 ? 'var(--qy-success-500)' : 'var(--qy-text-muted)');
                                    const companyClass = companyYearlyDiff > 0 ? 'var(--qy-error-500)' : (companyYearlyDiff < 0 ? 'var(--qy-success-500)' : 'var(--qy-text-muted)');

                                    const personalSign = personalYearlyDiff > 0 ? '+' : (personalYearlyDiff < 0 ? '-' : '');
                                    const companySign = companyYearlyDiff > 0 ? '+' : (companyYearlyDiff < 0 ? '-' : '');

                                    return `<td style="font-size: 12px;">
                                        <div style="color: var(--qy-text-secondary);">个人: ${formatMoney(personal * 12)}</div>
                                        <div style="font-size: 10px; color: ${personalClass}; margin-bottom: 2px;">${personalSign}${formatMoney(Math.abs(personalYearlyDiff))}</div>
                                        <div style="color: var(--qy-text-secondary);">单位: ${formatMoney(company * 12)}</div>
                                        <div style="font-size: 10px; color: ${companyClass}; margin-bottom: 2px;">${companySign}${formatMoney(Math.abs(companyYearlyDiff))}</div>
                                    </td>`;
                                }).join('')}
                            </tr>`;
                            })()}
                        </tbody>
                    </table>
                `;

                container.innerHTML = html;
            }

            removeScenario(id) {
                const scenario = this.scenarios.find(s => s.id === id);
                if (scenario && scenario.isBase) {
                    showToast('基准方案不可删除');
                    return;
                }
                this.scenarios = this.scenarios.filter(s => s.id !== id);
                this.renderComparison();
            }

            applyScenario(id) {
                const scenario = this.scenarios.find(s => s.id === id);
                if (!scenario) return;

                // 应用方案到主计算器
                document.getElementById('regionSelect').value = scenario.region;
                document.getElementById('salaryInput').value = scenario.salary;
                document.getElementById('socialScheme').value = scenario.socialScheme;
                document.getElementById('fundScheme').value = scenario.fundScheme;

                // 触发计算更新
                updateCalculation();
                updatePolicyDisplay(scenario.region);

                // 显示成功提示
                showToast(`已应用方案：${scenario.name}`);

                // 滚动到计算器顶部
                document.querySelector('.content-header').scrollIntoView({ behavior: 'smooth' });
            }

            clear() {
                // 只保留基准方案
                this.scenarios = this.scenarios.filter(s => s.isBase);
                this.renderComparison();
            }
        }

        // ========================================
        // 加载状态管理器
        // ========================================
        class LoadingManager {
            constructor() {
                this.overlay = document.getElementById('loadingOverlay');
                this.text = document.getElementById('loadingText');
            }

            show(text = '计算中...') {
                this.text.textContent = text;
                this.overlay.classList.add('is-visible');
            }

            hide() {
                this.overlay.classList.remove('is-visible');
            }
        }

        // ========================================
        // 表单验证
        // ========================================
        function validateSalary(value) {
            const num = parseFloat(value);
            const errorEl = document.getElementById('salaryError');
            const inputEl = document.getElementById('salaryInput');

            if (isNaN(num) || value === '') {
                errorEl.textContent = '请输入工资金额';
                inputEl.classList.add('qy-input--error');
                return false;
            }

            if (num <= 0) {
                errorEl.textContent = '工资必须大于0';
                inputEl.classList.add('qy-input--error');
                inputEl.classList.add('animate-shake');
                setTimeout(() => inputEl.classList.remove('animate-shake'), 400);
                return false;
            }

            if (num > 9999999) {
                errorEl.textContent = '工资金额过大';
                inputEl.classList.add('qy-input--error');
                return false;
            }

            errorEl.textContent = '';
            inputEl.classList.remove('qy-input--error');
            return true;
        }

        // ========================================
        // 主应用类
        // ========================================
        class CalculatorApp {
            constructor() {
                // History feature removed
                this.compare = new CalculatorCompare();
                this.loading = new LoadingManager();
                this.init();
            }

            init() {
                this.bindEvents();
                this.parseUrlParams();
                // renderHistory removed
                updatePolicyDisplay(document.getElementById('regionSelect').value);
                updateCalculation();
            }

            bindEvents() {
                // 工资输入防抖验证
                const salaryInput = document.getElementById('salaryInput');
                let debounceTimer;
                salaryInput.addEventListener('input', (e) => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => {
                        if (validateSalary(e.target.value)) {
                            updateCalculation();
                            this.autoSave();
                        }
                    }, 300);
                });

                // 选择器变化
                ['regionSelect', 'socialScheme', 'fundScheme'].forEach(id => {
                    document.getElementById(id).addEventListener('change', () => {
                        updateCalculation();
                        updatePolicyDisplay(document.getElementById('regionSelect').value);
                    });
                });

                // 键盘快捷键
                document.addEventListener('keydown', (e) => this.handleKeyboard(e));


            }

            autoSave() {
                clearTimeout(this.saveTimer);
                this.saveTimer = setTimeout(() => {
                    const salary = parseFloat(document.getElementById('salaryInput').value);
                    if (salary > 0) {
                        const record = this.captureCurrentState();
                        this.history.add(record);
                        // renderHistory removed
                    }
                }, 2000);
            }

            captureCurrentState() {
                return {
                    region: document.getElementById('regionSelect').value,
                    regionName: document.getElementById('regionSelect').selectedOptions[0].text,
                    salary: parseFloat(document.getElementById('salaryInput').value),
                    socialScheme: document.getElementById('socialScheme').value,
                    fundScheme: document.getElementById('fundScheme').value,
                    results: {
                        companyTotal: document.getElementById('companyTotal').textContent,
                        personalTotal: document.getElementById('personalTotal').textContent,
                        
                        total: document.getElementById('totalAmount').textContent
                    }
                };
            }

            handleKeyboard(e) {
                if (e.ctrlKey || e.metaKey) {
                    switch(e.key) {
                        case 'r':
                            e.preventDefault();
                            resetCalculator();
                            break;
                        case 's':
                            e.preventDefault();
                            const record = this.captureCurrentState();
                            this.history.add(record);
                            // renderHistory removed
                            showToast('已保存到历史记录');
                            break;
                        case 'p':
                            e.preventDefault();
                            exportToPDF();
                            break;
                    }
                }

                if (e.key === 'Escape') {
                    closeAllDrawers();
                }
            }

            parseUrlParams() {
                const params = new URLSearchParams(window.location.search);
                if (params.has('region')) {
                    document.getElementById('regionSelect').value = params.get('region');
                }
                if (params.has('salary')) {
                    document.getElementById('salaryInput').value = params.get('salary');
                }
                if (params.has('social')) {
                    document.getElementById('socialScheme').value = params.get('social');
                }
                if (params.has('fund')) {
                    document.getElementById('fundScheme').value = params.get('fund');
                }

                if (params.has('salary')) {
                    updateCalculation();
                    updatePolicyDisplay(document.getElementById('regionSelect').value);
                }
            }

            renderHistory() {
                // History feature removed
            }

            clearHistory() {
                this.history.clear();
                // renderHistory removed
                showToast('历史记录已清空');
            }

            toggleCompareSection() {
                const section = document.getElementById('compareSection');
                section.classList.toggle('is-hidden');
                if (!section.classList.contains('is-hidden')) {
                    // 如果没有基准方案，自动添加当前方案
                    if (!this.compare.scenarios.find(s => s.isBase)) {
                        this.compare.addBaseScenario();
                    }
                    // 如果没有对比方案，自动添加一个空的对比方案
                    if (!this.compare.scenarios.find(s => !s.isBase)) {
                        this.compare.addEmptyScenario();
                    }
                    this.compare.renderComparison();
                }
            }

            addToCompare() {
                return this.compare.addScenario();
            }

            removeCompareScenario(id) {
                this.compare.removeScenario(id);
            }

            applyCompareScenario(id) {
                this.compare.applyScenario(id);
            }

            clearCompare() {
                this.compare.clear();
            }

            updateCompareScenario(id, type, value) {
                this.compare.updateScenario(id, type, value);
            }
        }

        // ========================================
        // UI 交互函数
        // ========================================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('drawerOverlay');
            sidebar.classList.toggle('is-open');
            overlay.classList.toggle('is-visible', sidebar.classList.contains('is-open'));
        }

        function toggleFilterSidebar() {
            const sidebar = document.getElementById('filterSidebar');
            const overlay = document.getElementById('drawerOverlay');
            sidebar.classList.toggle('is-open');
            overlay.classList.toggle('is-visible', sidebar.classList.contains('is-open'));
