<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审批模板管理</title>
    <link rel="stylesheet" href="../styles/qingyang-variables.css">
    <link rel="stylesheet" href="../styles/qingyang-base.css">
    <link rel="stylesheet" href="../styles/qingyang-components.css">
    <link rel="stylesheet" href="../styles/qingyang-forms.css">
    <style>
        .page-container {
            min-height: 100vh;
            background: var(--qy-bg-secondary);
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--qy-space-4) var(--qy-space-6);
            background: var(--qy-bg-primary);
            border-bottom: 1px solid var(--qy-border-light);
        }
        .page-title {
            font-size: var(--qy-font-size-18);
            font-weight: var(--qy-font-weight-semibold);
            color: var(--qy-text-primary);
        }
        .page-content {
            padding: var(--qy-space-6);
        }
        .qy-card {
            background: var(--qy-bg-primary);
            border-radius: var(--qy-radius-lg);
            border: 1px solid var(--qy-border-light);
            overflow: hidden;
        }
        .status-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: var(--qy-radius-full);
            font-size: var(--qy-font-size-12);
            font-weight: var(--qy-font-weight-medium);
        }
        .status-tag .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .status-tag--synced { background: var(--qy-success-50); color: var(--qy-success-600); }
        .status-tag--synced .dot { background: var(--qy-success-500); }
        .status-tag--unsynced { background: var(--qy-gray-100); color: var(--qy-text-secondary); }
        .status-tag--unsynced .dot { background: var(--qy-gray-400); }
        .status-tag--syncing { background: var(--qy-primary-50); color: var(--qy-primary-600); }
        .status-tag--syncing .dot { background: var(--qy-primary-500); animation: pulse 1.5s infinite; }
        .status-tag--failed { background: var(--qy-danger-50); color: var(--qy-danger-600); }
        .status-tag--failed .dot { background: var(--qy-danger-500); }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .qy-drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: 480px;
            max-width: 100vw;
            height: 100vh;
            background: var(--qy-bg-primary);
            box-shadow: var(--qy-shadow-xl);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: var(--qy-z-index-drawer);
            display: flex;
            flex-direction: column;
        }
        .qy-drawer.is-open { transform: translateX(0); }
        .qy-drawer__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--qy-space-4) var(--qy-space-5);
            border-bottom: 1px solid var(--qy-border-light);
        }
        .qy-drawer__title {
            font-size: var(--qy-font-size-16);
            font-weight: var(--qy-font-weight-semibold);
            color: var(--qy-text-primary);
        }
        .qy-drawer__close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--qy-radius-md);
            color: var(--qy-text-secondary);
            cursor: pointer;
            transition: all var(--qy-transition-fast);
        }
        .qy-drawer__close:hover {
            background: var(--qy-bg-secondary);
            color: var(--qy-text-primary);
        }
        .qy-drawer__body {
            flex: 1;
            overflow-y: auto;
            padding: var(--qy-space-5);
        }
        .qy-drawer__footer {
            padding: var(--qy-space-4) var(--qy-space-5);
            border-top: 1px solid var(--qy-border-light);
            display: flex;
            gap: var(--qy-space-3);
            justify-content: flex-end;
        }
        .drawer-section { margin-bottom: var(--qy-space-5); }
        .drawer-section__title {
            font-size: var(--qy-font-size-13);
            font-weight: var(--qy-font-weight-semibold);
            color: var(--qy-text-primary);
            margin-bottom: var(--qy-space-3);
        }
        .drawer-divider {
            height: 1px;
            background: var(--qy-border-light);
            margin: var(--qy-space-5) 0;
        }
        .qy-form-item { margin-bottom: var(--qy-space-4); }
        .qy-form-item__label {
            display: block;
            font-size: var(--qy-font-size-13);
            color: var(--qy-text-secondary);
            margin-bottom: var(--qy-space-2);
        }
        .qy-form-item__value {
            font-size: var(--qy-font-size-14);
            color: var(--qy-text-primary);
            padding: var(--qy-space-2) 0;
        }
        .action-btns { display: flex; gap: var(--qy-space-2); flex-wrap: nowrap; }
        .action-btns .qy-btn { white-space: nowrap; }
        .platform-tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: var(--qy-radius-sm);
            font-size: var(--qy-font-size-12);
            background: var(--qy-primary-50);
            color: var(--qy-primary-600);
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <h1 class="page-title">审批模板管理</h1>
            <button class="qy-btn qy-btn--primary" onclick="openAddTemplateDrawer()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                新建模板
            </button>
        </div>
        <div class="page-content">
            <div class="qy-card">
                <div class="qy-table-wrapper">
                    <table class="qy-table" style="table-layout:fixed;">
                        <colgroup>
                            <col style="width:150px">
                            <col style="width:100px">
                            <col style="width:80px">
                            <col style="width:140px">
                            <col style="width:90px">
                            <col style="width:280px">
                            <col style="width:200px">
                        </colgroup>
                        <thead>
                            <tr>
                                <th>模板名称</th>
                                <th>模板类型</th>
                                <th>审批通道</th>
                                <th>模板ID</th>
                                <th>同步状态</th>
                                <th style="text-align:left;">备注</th>
                                <th style="text-align:left;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="templateList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="qy-drawer" id="drawer">
        <div class="qy-drawer__header">
            <h3 class="qy-drawer__title" id="drawerTitle">模板详情</h3>
            <div class="qy-drawer__close" onclick="closeDrawer()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
        </div>
        <div class="qy-drawer__body" id="drawerContent"></div>
        <div class="qy-drawer__footer" id="drawerFooter" style="display:none;"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api/approval';

        const mockTemplates = [
            { name: '付款申请', type: 'payment_request', platform: 'wecom', sync_status: 'synced', wecom_template_id: '1234567890', auth: { corpid: 'ww123456', secret: 'testsecret', agentid: '1000001' }, disabled: false, remark: '用于常规付款流程审批' },
            { name: '收入确认', type: 'income_confirm', platform: 'dingtalk', sync_status: 'unsynced', wecom_template_id: null, auth: null, disabled: false, remark: '' },
            { name: '垫付申请', type: 'advance_apply', platform: 'qingyang', sync_status: 'failed', wecom_template_id: null, auth: null, disabled: true, remark: '员工垫付款项' },
            { name: '开票申请', type: 'invoice_apply', platform: 'wecom', sync_status: 'synced', wecom_template_id: 'TM987654321', auth: { corpid: 'ww123456', secret: 'testsecret', agentid: '1000001' }, disabled: false, remark: '' }
        ];

        let currentDrawerMode = 'view';
        let currentEditType = null;

        async function loadTemplates() {
            try {
                const res = await fetch(`${API_BASE}/templates`);
                const data = await res.json();
                renderTemplates(data.data);
            } catch (e) {
                renderTemplates(mockTemplates);
            }
        }

        function renderTemplates(templates) {
            const tbody = document.getElementById('templateList');
            tbody.innerHTML = templates.map(t => `
                <tr style="${t.disabled ? 'opacity:0.5;' : ''}">
                    <td>
                        <strong>${t.name}</strong>
                        ${t.disabled ? '<span style="margin-left:8px;font-size:11px;padding:2px 6px;background:#fee2e2;color:#dc2626;border-radius:4px;">已停用</span>' : ''}
                    </td>
                    <td>${getTemplateTypeText(t.type)}</td>
                    <td><span class="platform-tag">${getPlatformText(t.platform)}</span></td>
                    <td>${t.wecom_template_id || '<span style="color:#94a3b8;">未同步</span>'}</td>
                    <td><span class="status-tag status-tag--${t.sync_status}"><span class="dot"></span>${getStatusText(t.sync_status)}</span></td>
                    <td style="color:#64748b;font-size:13px;">${t.remark || '-'}</td>
                    <td>
                        <div class="action-btns">
                            <button class="qy-btn qy-btn--small qy-btn--text" onclick="openViewDrawer('${t.type}')">详情</button>
                            ${t.sync_status === 'synced' || t.disabled ? '' : `<button class="qy-btn qy-btn--small qy-btn--text" onclick="openEditTemplateDrawer('${t.type}')">编辑</button>`}
                            ${t.disabled || t.sync_status === 'synced' ? '' : `<button class="qy-btn qy-btn--small qy-btn--primary" onclick="syncTemplate('${t.type}')">同步</button>`}
                            ${t.sync_status === 'synced' && !t.disabled ? `<button class="qy-btn qy-btn--small qy-btn--primary" onclick="updateTemplateForm('${t.type}')">更新</button>` : ''}
                            <button class="qy-btn qy-btn--small qy-btn--text" style="color:var(--qy-primary-500)" onclick="toggleTemplate('${t.type}')">${t.disabled ? '启用' : '停用'}</button>
                            ${t.sync_status === 'synced' || t.disabled ? '' : `<button class="qy-btn qy-btn--small qy-btn--text" style="color:var(--qy-danger-500)" onclick="deleteTemplate('${t.type}')">删除</button>`}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function getPlatformText(platform) {
            return { wecom: '企微', dingtalk: '钉钉', qingyang: '青阳云' }[platform] || platform || '-';
        }

        function getStatusText(status) {
            return { unsynced: '未同步', syncing: '同步中', synced: '已同步', failed: '同步失败' }[status] || status;
        }

        function getTemplateTypeText(type) {
            return { payment_request: '付款申请', income_confirm: '收入确认', advance_apply: '垫付申请', invoice_apply: '开票申请' }[type] || type;
        }

        function openAddTemplateDrawer() {
            currentDrawerMode = 'create';
            currentEditType = null;
            document.getElementById('drawerTitle').textContent = '新建模板';
            document.getElementById('drawerContent').innerHTML = `
                <div class="drawer-section">
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">模板名称</label>
                        <input type="text" id="drawerName" class="qy-input" style="width:100%" placeholder="如：费用报销单">
                    </div>
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">模板类型</label>
                        <select id="drawerType" class="qy-input" style="width:100%" onchange="updateFormPreview()">
                            <option value="">请选择</option>
                            <option value="payment_request">付款申请</option>
                            <option value="income_confirm">收入确认</option>
                            <option value="advance_apply">垫付申请</option>
                            <option value="invoice_apply">开票申请</option>
                        </select>
                    </div>
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">审批通道</label>
                        <select id="drawerPlatform" class="qy-input" style="width:100%">
                            <option value="wecom">企微</option>
                            <option value="dingtalk">钉钉</option>
                            <option value="qingyang">青阳云</option>
                        </select>
                    </div>
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">备注</label>
                        <input type="text" id="drawerRemark" class="qy-input" style="width:100%" placeholder="请输入备注信息">
                    </div>
                </div>
                <div class="drawer-divider"></div>
                <div class="drawer-section">
                    <div class="drawer-section__title">表单配置预览</div>
                    <div id="formPreview" style="background:#f8fafc;padding:12px;border-radius:8px;font-size:13px;color:#64748b;">
                        请选择模板类型
                    </div>
                </div>
                <div class="drawer-divider"></div>
                <div class="drawer-section">
                    <div class="drawer-section__title">鉴权信息</div>
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">企业ID (corpid)</label>
                        <input type="text" id="drawerCorpid" class="qy-input" style="width:100%" placeholder="请输入企业ID">
                    </div>
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">应用Secret</label>
                        <input type="password" id="drawerSecret" class="qy-input" style="width:100%" placeholder="请输入应用Secret">
                    </div>
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">应用AgentId</label>
                        <input type="text" id="drawerAgentid" class="qy-input" style="width:100%" placeholder="请输入应用AgentId">
                    </div>
                </div>
            `;
            document.getElementById('drawerFooter').innerHTML = `
                <button class="qy-btn qy-btn--secondary" onclick="closeDrawer()">取消</button>
                <button class="qy-btn qy-btn--primary" onclick="saveTemplateFromDrawer()">保存</button>
            `;
            document.getElementById('drawerFooter').style.display = 'flex';
            document.getElementById('drawer').classList.add('is-open');
        }

        function updateFormPreview() {
            const type = document.getElementById('drawerType').value;
            const preview = document.getElementById('formPreview');
            if (!type) {
                preview.innerHTML = '{"fields": []}';
                preview.style.color = '#94a3b8';
                return;
            }
            const fields = getFormFields(type);
            preview.style.color = '#1e293b';
            preview.innerHTML = `<pre style="margin:0;font-size:12px;white-space:pre-wrap;word-break:break-all;">${JSON.stringify({fields}, null, 2)}</pre>`;
        }

        function openEditTemplateDrawer(templateType) {
            const template = mockTemplates.find(t => t.type === templateType);
            if (!template) return;

            currentDrawerMode = 'edit';
            currentEditType = templateType;
            document.getElementById('drawerTitle').textContent = '编辑模板';
            document.getElementById('drawerContent').innerHTML = `
                <div class="drawer-section">
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">模板名称</label>
                        <input type="text" id="drawerName" class="qy-input" style="width:100%" value="${template.name}">
                    </div>
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">模板类型</label>
                        <select id="drawerType" class="qy-input" style="width:100%" onchange="updateFormPreview()">
                            <option value="payment_request" ${template.type === 'payment_request' ? 'selected' : ''}>付款申请</option>
                            <option value="income_confirm" ${template.type === 'income_confirm' ? 'selected' : ''}>收入确认</option>
                            <option value="advance_apply" ${template.type === 'advance_apply' ? 'selected' : ''}>垫付申请</option>
                            <option value="invoice_apply" ${template.type === 'invoice_apply' ? 'selected' : ''}>开票申请</option>
                        </select>
                    </div>
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">审批通道</label>
                        <select id="drawerPlatform" class="qy-input" style="width:100%">
                            <option value="wecom" ${template.platform === 'wecom' ? 'selected' : ''}>企微</option>
                            <option value="dingtalk" ${template.platform === 'dingtalk' ? 'selected' : ''}>钉钉</option>
                            <option value="qingyang" ${template.platform === 'qingyang' ? 'selected' : ''}>青阳云</option>
                        </select>
                    </div>
                </div>
                <div class="drawer-divider"></div>
                <div class="drawer-section">
                    <div class="drawer-section__title">表单配置预览</div>
                    <div id="formPreview" style="background:#f8fafc;padding:12px;border-radius:8px;font-size:13px;color:#1e293b;"></div>
                </div>
                <div class="drawer-divider"></div>
                <div class="drawer-section">
                    <div class="drawer-section__title">鉴权信息</div>
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">企业ID (corpid)</label>
                        <input type="text" id="drawerCorpid" class="qy-input" style="width:100%" value="${template.auth?.corpid || ''}">
                    </div>
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">应用Secret</label>
                        <input type="password" id="drawerSecret" class="qy-input" style="width:100%" value="${template.auth?.secret || ''}">
                    </div>
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">应用AgentId</label>
                        <input type="text" id="drawerAgentid" class="qy-input" style="width:100%" value="${template.auth?.agentid || ''}">
                    </div>
                </div>
                <div class="drawer-divider"></div>
                <div class="drawer-section">
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">备注</label>
                        <input type="text" id="drawerRemark" class="qy-input" style="width:100%" value="${template.remark || ''}" placeholder="请输入备注信息">
                    </div>
                </div>
            `;
            document.getElementById('drawerFooter').innerHTML = `
                <button class="qy-btn qy-btn--secondary" onclick="closeDrawer()">取消</button>
                <button class="qy-btn qy-btn--primary" onclick="saveTemplateFromDrawer()">保存</button>
            `;
            document.getElementById('drawerFooter').style.display = 'flex';

            // 回显表单预览
            setTimeout(() => updateFormPreview(), 0);
            document.getElementById('drawer').classList.add('is-open');
        }

        function openViewDrawer(templateType) {
            const template = mockTemplates.find(t => t.type === templateType);
            if (!template) return;

            currentDrawerMode = 'view';
            document.getElementById('drawerTitle').textContent = '模板详情';
            const fields = getFormFields(template.type);
            document.getElementById('drawerContent').innerHTML = `
                <div class="drawer-section">
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">模板名称</label>
                        <div class="qy-form-item__value">${template.name}</div>
                    </div>
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">模板类型</label>
                        <div class="qy-form-item__value">${getTemplateTypeText(template.type)}</div>
                    </div>
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">审批通道</label>
                        <div class="qy-form-item__value"><span class="platform-tag">${getPlatformText(template.platform)}</span></div>
                    </div>
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">模板ID</label>
                        <div class="qy-form-item__value">${template.wecom_template_id || '-'}</div>
                    </div>
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">同步状态</label>
                        <div class="qy-form-item__value"><span class="status-tag status-tag--${template.sync_status}"><span class="dot"></span>${getStatusText(template.sync_status)}</span></div>
                    </div>
                    <div class="qy-form-item">
                        <label class="qy-form-item__label">备注</label>
                        <div class="qy-form-item__value">${template.remark || '-'}</div>
                    </div>
                </div>
                <div class="drawer-divider"></div>
                <div class="drawer-section">
                    <div class="drawer-section__title">表单配置</div>
                    <pre style="background:#f8fafc;padding:12px;border-radius:8px;font-size:12px;margin:0;white-space:pre-wrap;word-break:break-all;">${JSON.stringify({fields}, null, 2)}</pre>
                </div>
            `;
            document.getElementById('drawerFooter').innerHTML = `
                <button class="qy-btn qy-btn--primary" onclick="syncTemplate('${template.type}')">同步到${getPlatformText(template.platform)}</button>
            `;
            document.getElementById('drawerFooter').style.display = 'flex';
            document.getElementById('drawer').classList.add('is-open');
        }

        function getFormFields(type) {
            const fields = {
                payment_request: [
                    { id: '1', name: '申请人', type: '文本' },
                    { id: '2', name: '付款金额', type: '数字' },
                    { id: '3', name: '付款方', type: '文本' },
                    { id: '4', name: '付款方式', type: '单选', options: ['转账', '支票', '现金'] },
                    { id: '5', name: '摘要', type: '多行文本' }
                ],
                income_confirm: [
                    { id: '1', name: '客户名称', type: '文本' },
                    { id: '2', name: '确认金额', type: '数字' },
                    { id: '3', name: '收入类型', type: '单选', options: ['服务收入', '产品收入', '其他'] },
                    { id: '4', name: '确认日期', type: '日期' },
                    { id: '5', name: '备注', type: '多行文本' }
                ],
                advance_apply: [
                    { id: '1', name: '申请人', type: '文本' },
                    { id: '2', name: '垫付金额', type: '数字' },
                    { id: '3', name: '垫付原因', type: '多行文本' },
                    { id: '4', name: '预计归还日期', type: '日期' }
                ],
                invoice_apply: [
                    { id: '1', name: '申请人', type: '文本' },
                    { id: '2', name: '发票类型', type: '单选', options: ['增值税专用发票', '增值税普通发票'] },
                    { id: '3', name: '开票金额', type: '数字' },
                    { id: '4', name: '税号', type: '文本' },
                    { id: '5', name: '开户银行', type: '文本' },
                    { id: '6', name: '银行账号', type: '文本' },
                    { id: '7', name: '备注', type: '多行文本' }
                ]
            };
            return fields[type] || [];
        }

        function closeDrawer() {
            document.getElementById('drawer').classList.remove('is-open');
            currentDrawerMode = 'view';
            currentEditType = null;
        }

        function saveTemplateFromDrawer() {
            const name = document.getElementById('drawerName').value.trim();
            const type = document.getElementById('drawerType').value.trim();
            const platform = document.getElementById('drawerPlatform').value;
            const corpid = document.getElementById('drawerCorpid').value.trim();
            const secret = document.getElementById('drawerSecret').value.trim();
            const agentid = document.getElementById('drawerAgentid').value.trim();
            const remark = document.getElementById('drawerRemark').value.trim();

            if (!name || !type) { alert('请填写模板名称和类型'); return; }

            if (currentDrawerMode === 'create') {
                if (mockTemplates.some(t => t.type === type)) { alert('模板类型已存在'); return; }
                mockTemplates.push({ name, type, platform, sync_status: 'unsynced', wecom_template_id: null, auth: { corpid, secret, agentid }, remark });
            } else {
                const template = mockTemplates.find(t => t.type === currentEditType);
                if (template) { template.name = name; template.platform = platform; template.auth = { corpid, secret, agentid }; template.remark = remark; }
            }
            renderTemplates(mockTemplates);
            closeDrawer();
        }

        function deleteTemplate(templateType) {
            if (!confirm('确定要删除该模板吗？')) return;
            const idx = mockTemplates.findIndex(t => t.type === templateType);
            if (idx !== -1) { mockTemplates.splice(idx, 1); renderTemplates(mockTemplates); }
        }

        function toggleTemplate(templateType) {
            const template = mockTemplates.find(t => t.type === templateType);
            if (template) {
                template.disabled = !template.disabled;
                renderTemplates(mockTemplates);
            }
        }

        function syncTemplate(templateType) {
            if (!confirm('确定要同步此模板吗？')) return;
            const template = mockTemplates.find(t => t.type === templateType);
            if (template) {
                template.sync_status = 'syncing';
                renderTemplates(mockTemplates);
                setTimeout(() => {
                    template.sync_status = 'synced';
                    template.wecom_template_id = 'TM' + Date.now();
                    renderTemplates(mockTemplates);
                    alert('同步成功');
                }, 1500);
            }
        }

        function updateTemplateForm(templateType) {
            if (!confirm('确定要更新此模板的表单配置吗？')) return;
            const template = mockTemplates.find(t => t.type === templateType);
            if (template) {
                template.sync_status = 'syncing';
                renderTemplates(mockTemplates);
                setTimeout(() => {
                    template.sync_status = 'synced';
                    renderTemplates(mockTemplates);
                    alert('表单更新成功');
                }, 1500);
            }
        }

        loadTemplates();
    </script>
</body>
</html>
