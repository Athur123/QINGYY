<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青阳云 HRO 原型入口</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/qingyang-variables.css">
    <link rel="stylesheet" href="../styles/qingyang-base.css">
    <link rel="stylesheet" href="../styles/qingyang-components.css">
    <link rel="stylesheet" href="../styles/qingyang-forms.css">
    <style>
        * { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', var(--qy-font-primary);
            color: var(--qy-text-primary);
            background:
                linear-gradient(135deg, rgba(37, 99, 235, 0.08), transparent 34%),
                linear-gradient(225deg, rgba(22, 163, 74, 0.07), transparent 30%),
                var(--qy-bg-secondary);
        }

        a { color: inherit; text-decoration: none; }

        .shell {
            width: min(1360px, calc(100% - 48px));
            margin: 0 auto;
            padding: 40px 0 56px;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 24px;
            align-items: end;
            padding: 28px 32px;
            border: 1px solid rgba(148, 163, 184, 0.28);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.86);
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(12px);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: var(--qy-primary-600);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .eyebrow::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--qy-primary-500);
            box-shadow: 0 0 0 5px var(--qy-primary-50);
        }

        .hero h1 {
            margin: 0;
            font-size: 34px;
            line-height: 1.18;
            letter-spacing: 0;
        }

        .hero p {
            max-width: 760px;
            margin: 12px 0 0;
            color: var(--qy-text-secondary);
            font-size: 14px;
            line-height: 1.75;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 112px);
            gap: 10px;
        }

        .stat {
            padding: 14px;
            border: 1px solid var(--qy-border-light);
            border-radius: 12px;
            background: var(--qy-bg-primary);
            text-align: center;
        }

        .stat__value {
            display: block;
            color: var(--qy-text-primary);
            font-size: 24px;
            font-weight: 700;
            line-height: 1;
        }

        .stat__label {
            display: block;
            margin-top: 8px;
            color: var(--qy-text-muted);
            font-size: 12px;
        }

        .toolbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            gap: 8px;
            align-items: center;
            margin: 20px 0 24px;
            padding: 12px;
            border: 1px solid rgba(226, 232, 240, 0.92);
            border-radius: 14px;
            background: rgba(248, 250, 252, 0.92);
            backdrop-filter: blur(10px);
            overflow-x: auto;
        }

        .module-link {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            height: 34px;
            padding: 0 13px;
            border: 1px solid var(--qy-border-light);
            border-radius: 999px;
            background: var(--qy-bg-primary);
            color: var(--qy-text-secondary);
            font-size: 13px;
            font-weight: 600;
            transition: border-color 160ms ease, color 160ms ease, background 160ms ease;
        }

        .module-link:hover {
            border-color: var(--qy-primary-300);
            background: var(--qy-primary-50);
            color: var(--qy-primary-600);
        }

        .module {
            margin-top: 24px;
            padding: 24px;
            border: 1px solid var(--qy-border-light);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
        }

        .module__header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
            margin-bottom: 18px;
        }

        .module__title {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 0;
            font-size: 20px;
            line-height: 1.25;
        }

        .module__mark {
            display: inline-grid;
            place-items: center;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: var(--qy-primary-50);
            color: var(--qy-primary-600);
            font-size: 15px;
            font-weight: 700;
        }

        .module__desc {
            margin: 8px 0 0 44px;
            color: var(--qy-text-secondary);
            font-size: 13px;
            line-height: 1.65;
        }

        .module__meta {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            background: var(--qy-bg-secondary);
            color: var(--qy-text-muted);
            font-size: 12px;
            font-weight: 600;
        }

        .page-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        .page-card {
            display: flex;
            min-height: 154px;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px;
            border: 1px solid var(--qy-border-light);
            border-radius: 12px;
            background: var(--qy-bg-primary);
            transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
        }

        .page-card:hover {
            transform: translateY(-2px);
            border-color: var(--qy-primary-200);
            box-shadow: 0 12px 28px rgba(37, 99, 235, 0.1);
        }

        .page-card--obsolete {
            border-style: dashed;
            background: #F8FAFC;
        }

        .page-card__top {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
        }

        .page-card__title {
            margin: 0;
            color: var(--qy-text-primary);
            font-size: 15px;
            line-height: 1.45;
            font-weight: 700;
        }

        .badge {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            height: 22px;
            padding: 0 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        .badge--main { background: var(--qy-primary-50); color: var(--qy-primary-600); }
        .badge--iteration { background: #F1F5F9; color: #475569; }
        .badge--demo { background: #ECFDF5; color: #047857; }
        .badge--obsolete { background: #FEF2F2; color: #B91C1C; }

        .page-card__desc {
            margin: 10px 0 14px;
            color: var(--qy-text-secondary);
            font-size: 13px;
            line-height: 1.62;
        }

        .page-card__path {
            display: block;
            padding-top: 12px;
            border-top: 1px solid var(--qy-border-light);
            color: var(--qy-text-muted);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 12px;
            word-break: break-all;
        }

        .footer-note {
            margin-top: 26px;
            color: var(--qy-text-muted);
            font-size: 12px;
            line-height: 1.7;
            text-align: center;
        }

        @media (max-width: 900px) {
            .shell {
                width: min(100% - 28px, 760px);
                padding-top: 22px;
            }

            .hero {
                grid-template-columns: 1fr;
                padding: 24px;
            }

            .stats {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .module__header {
                flex-direction: column;
            }

            .module__desc {
                margin-left: 0;
            }
        }

        @media (max-width: 560px) {
            .hero h1 { font-size: 26px; }

            .stats { grid-template-columns: 1fr; }

            .module { padding: 18px; }

            .page-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="hero" aria-labelledby="page-title">
            <div>
                <div class="eyebrow">Qingyang HRO Prototype</div>
                <h1 id="page-title">青阳云 HRO 原型浏览入口</h1>
                <p>按业务模块汇总当前仓库里的静态 HTML 原型。这里是浏览入口，不承载业务逻辑；现行主线、历史迭代、演示页和废弃页会用状态标签区分。</p>
            </div>
            <div class="stats" aria-label="原型统计">
                <div class="stat">
                    <span class="stat__value">7</span>
                    <span class="stat__label">业务模块</span>
                </div>
                <div class="stat">
                    <span class="stat__value">39</span>
                    <span class="stat__label">原型页面</span>
                </div>
                <div class="stat">
                    <span class="stat__value">1</span>
                    <span class="stat__label">废弃入口</span>
                </div>
            </div>
        </section>

        <nav class="toolbar" aria-label="模块导航">
            <a class="module-link" href="#reconciliation">对账复核</a>
            <a class="module-link" href="#calculator">社保计算</a>
            <a class="module-link" href="#employee">员工管理</a>
            <a class="module-link" href="#insurance-config">参保配置</a>
            <a class="module-link" href="#settlement">结算方案</a>
            <a class="module-link" href="#approval">审批管理</a>
            <a class="module-link" href="#system">系统</a>
        </nav>

        <div data-prototype-index></div>

        <p class="footer-note">从项目根目录运行 <code>python3 -m http.server 8080</code> 后访问 <code>http://localhost:8080/prototype/</code>。</p>
    </main>
    <script src="shared/prototype-nav.js"></script>
</body>
</html>
